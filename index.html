<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A simple habit tracker to track your goals">
    <meta name="keywords" content="habit tracker, goals, tasks, time management, effectivity, productive">
    <meta name="author" content="Sanapala DivyaSri">
    <title>Habit Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

        <header>
            <h1>Habit Tracker</h1>
        </header>


        <div class="input_section">
            <input type="text" id="habitInput" placeholder="Enter a Habit">
            
        <button id="addButton">Add</button>
        </div>


        <div class="display_section">
            <h2>Habits</h2>
            <ul id="habitList">
            </ul>
            <p class="note">Double-Click a habit to delete it.</p>
        </div>

<script src="script.js"></script>
</body>
</html>
